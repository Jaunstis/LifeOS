      // 音频合成播放
      function playSynthBeep(freq, type = 'sine', duration = 0.3, extraPitch = 0) {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          if (extraPitch) {
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + duration);
          }
          gain.gain.setValueAtTime(0.08, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {}
      }

              newExp -= newMaxExp;
              newLevel += 1;
              newMaxExp = Math.floor(newMaxExp * 1.2);
            }
            return {
              ...prev,
              level: newLevel,
              exp: newExp,
              maxExp: newMaxExp,
              energy: Math.min(prev.maxEnergy, Math.max(0, prev.energy + energyChange)),
              mood: Math.min(prev.maxMood, Math.max(0, prev.mood + moodChange)),

            {/* 🔮 渲染成就详情弹窗 (3D发光详情) */}
            {selectedAchievement && (
              <div className="fixed inset-0 flex items-center justify-center z-40 bg-slate-950/40 backdrop-blur-sm p-4 animate-fadeIn font-sans">
                <div className="bg-white border border-slate-200 rounded-[24px] p-8 max-w-sm w-full shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] relative">
                  <button onClick={() => setSelectedAchievement(null)} className="absolute top-5 right-5 text-slate-400 hover:text-slate-600 bg-slate-50 p-1.5 rounded-full cursor-pointer transition-colors"><IconX /></button>
                  <div className="flex flex-col items-center text-center mt-2">
                    <div className={`w-24 h-28 rounded-[20px] flex items-center justify-center text-4xl mb-5 shadow-sm bg-indigo-50 border-2 border-indigo-200 animate-bounce`}>
                      {checkIsUnlocked(selectedAchievement.id) ? selectedAchievement.icon : '🔒'}
                    </div>
                    <div className="flex gap-2 mb-4">
                      <span className="text-[10px] uppercase tracking-wider bg-slate-100 text-slate-500 px-2.5 py-1 rounded-lg border border-slate-200 font-bold">{selectedAchievement.category || '奇遇'}</span>
                      <span className={`text-[10px] uppercase tracking-wider px-2.5 py-1 rounded-lg font-bold ${getRarityBadgeStyle(selectedAchievement.rarity)}`}>{selectedAchievement.rarity}</span>
                    </div>
                    <h2 className="text-xl font-black tracking-tight text-slate-800 mb-2">{checkIsUnlocked(selectedAchievement.id) ? selectedAchievement.title : '未解密的成就'}</h2>
                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest flex items-center gap-1.5 mb-6">
                      {checkIsUnlocked(selectedAchievement.id) ? (
                        <React.Fragment>
                          <IconCalendar /><span>UNLOCKED AT {new Date().toLocaleDateString()}</span>
                        </React.Fragment>
                      ) : (<span>🚧 LOCKED IN THE VOID</span>)}
                    </div>
                    <div className="bg-slate-50 border border-slate-100 p-5 rounded-xl w-full mb-6 text-left shadow-inner">
                      <p className="text-xs text-slate-600 leading-relaxed font-sans font-medium">
                        {checkIsUnlocked(selectedAchievement.id) ? selectedAchievement.desc : `解锁线索：需要达成与「${selectedAchievement.title}」相关的挑战。努力打卡吧！`}
                      </p>
                    </div>
                    
                    {checkIsUnlocked(selectedAchievement.id) ? (
                      <div className="w-full flex flex-col gap-3">
                        <div className="bg-amber-50 border border-amber-200 py-3 px-5 rounded-xl flex items-center justify-between text-amber-600 text-sm font-bold font-mono shadow-sm">
                          <span className="flex items-center gap-2"><IconCoins /> REWARD</span><span>+ {selectedAchievement.reward} GOLD</span>
                        </div>
                        <button onClick={() => { showToast("时光胶囊已同步分享！"); setSelectedAchievement(null); }} className="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white rounded-xl font-bold transition-all shadow-md text-xs font-sans">
                          分享成就胶囊
                        </button>
                      </div>
                    ) : (
                      <button onClick={() => { unlockAchievement(selectedAchievement.id); setSelectedAchievement(null); }} className="w-full py-3 bg-white hover:bg-slate-50 border border-slate-200 text-slate-500 hover:text-slate-800 rounded-xl font-bold transition-all text-xs shadow-sm font-sans">
                        💡 [测试功能] 手动解锁此成就
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* 时光信件弹窗 */}
            {timeLetter && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                <div className="bg-white max-w-md w-full rounded-[24px] p-6 border border-slate-200 shadow-lg space-y-4">
                  <div className="flex justify-between items-center border-b pb-2"><span className="text-xs font-bold text-slate-500 flex items-center gap-1.5"><IconMail className="text-slate-400 w-4 h-4" /> 封存具有时光属性的信件</span><button onClick={() => setTimeLetter(null)} className="text-slate-405"><IconX /></button></div>
                  <p className="text-xs text-slate-600 whitespace-pre-line leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 shadow-inner font-sans font-medium">{timeLetter}</p>
                </div>
              </div>
            )}

            {/* Toast 气泡 */}
            {toast.show && (
              <div className="fixed bottom-10 left-1/2 transform -translate-x-1/2 z-50">
                <div className="px-5 py-2.5 rounded-full bg-white border border-slate-200 text-xs font-bold flex items-center gap-2 text-slate-700 shadow-lg animate-fadeIn">
                  <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-ping"></span>
                  {toast.message}
                </div>
              </div>
            )}

            {/* 升级弹窗 */}
            {showLevelUp && (
              <div className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none bg-slate-950/10 backdrop-blur-sm animate-fadeIn">
                <div className="bg-white text-slate-800 p-8 rounded-3xl border border-amber-200 shadow-lg text-center max-w-xs transform scale-110 transition-all">
                  <h2 className="text-3xl font-black text-amber-500 tracking-tighter">LEVEL UP</h2>
                  <p className="text-xs text-slate-500 mt-2 font-medium">个人芯片等级提升至 <span className="font-mono text-amber-500 font-bold">Lv.{stats.level}</span></p>
                </div>
              </div>
            )}

          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
